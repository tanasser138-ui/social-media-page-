<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="تابع Premier UPVC على مواقع التواصل الاجتماعي - إنستغرام، فيسبوك، تيك توك، لينكدإن">
  <meta property="og:title" content="Premier UPVC - مواقع التواصل الاجتماعي">
  <meta property="og:description" content="تابع Premier UPVC على مواقع التواصل الاجتماعي">
  <meta property="og:type" content="website">
  <title>Premier UPVC - مواقع التواصل الاجتماعي</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 20px;
      padding: 10px;
    }
    .social-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #333;
      transition: transform 0.2s;
    }
    .social-item:hover {
      transform: scale(1.1);
    }
    .social-item img {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
      object-fit: contain;
      border-radius: 8px;
    }
    .social-item span {
      font-size: 14px;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      .social-grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }
      .social-item img {
        width: 50px;
        height: 50px;
        object-fit: contain;
        border-radius: 6px;
      }
      .social-item span {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>تابع Premier UPVC على مواقع التواصل الاجتماعي</h1>
    <div class="social-grid">
      <a href="https://www.instagram.com/upvcpremier?igsh=OTA3dWMydWZjOTN1" target="_blank" rel="noopener noreferrer" class="social-item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram Logo" loading="lazy">
        <span>إنستغرام</span>
      </a>
      <a href="https://www.facebook.com/share/1CU7qqnmjp/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" class="social-item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook Logo" loading="lazy">
        <span>فيسبوك</span>
      </a>
      <a href="https://www.tiktok.com/@upvcpremier?_t=ZS-8ypABW4hiRl&_r=1" target="_blank" rel="noopener noreferrer" class="social-item">
        <img src="tiktok_icon.png" alt="TikTok Logo" loading="lazy">
        <span>تيك توك</span>
      </a>
      <a href="https://www.linkedin.com/company/premier-upvc/" target="_blank" rel="noopener noreferrer" class="social-item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/LinkedIn_logo_initials.png/600px-LinkedIn_logo_initials.png" alt="LinkedIn Logo" loading="lazy">
        <span>لينكدإن</span>
      </a>
    </div>
  </div>
</body>
</html>
